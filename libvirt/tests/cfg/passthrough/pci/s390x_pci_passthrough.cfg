- libvirt_pci_passthrough:
    only s390-virtio
    type = s390x_pci_passthrough
    start_vm = yes
    guest_iface = enc1
    variants plugmethod:
        - hotplug:
        - coldplug:
    variants:
        - ism:
            driver_name = "ism"
        - roce:
            no connect
            driver_name = "mlx5_core"
    variants:
        - happy_path:
            check = available
        - reboot:
            check = available_after_reboot
        - reboot_start:
            check = start_after_reboot
        - connect:
            check = smc_functional
