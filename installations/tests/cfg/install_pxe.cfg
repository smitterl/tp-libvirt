- install_pxe:
    type = install_pxe
    start_vm = no
    kill_vm = yes
    kill_vm_before_test = yes
    kill_vm_on_error = yes
    kill_vm_gracefully = no
    disksize = 5
    guestmachine = s390-ccw-virtio
    variants:
        - define:
            install_type = define
        - create:
            install_type = create
